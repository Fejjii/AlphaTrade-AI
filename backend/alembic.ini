# Alembic configuration. The database URL is resolved at runtime in env.py from
# application settings (or the ALEMBIC_DATABASE_URL override), so it is left
# blank here and never hardcodes credentials.

[alembic]
script_location = src/app/db/migrations
prepend_sys_path = src
path_separator = os
sqlalchemy.url =

# Generated migrations are excluded from project linting (see pyproject ruff
# config); formatting is applied here at creation time.
[post_write_hooks]
hooks = ruff_format
ruff_format.type = exec
ruff_format.executable = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
