[project]
name = "alphatrade-backend"
version = "0.1.0"
description = "AlphaTrade AI - human-in-the-loop trading copilot backend"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.34.0",
    "pydantic>=2.10.0",
    "pydantic-settings>=2.7.0",
    "email-validator>=2.2.0",
    "structlog>=24.4.0",
    "sqlalchemy>=2.0.36",
    "alembic>=1.14.0",
    "psycopg[binary]>=3.2.0",
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
    "bcrypt>=4.2.0",
    "pyjwt>=2.10.0",
    "redis>=5.2.0",
    "httpx>=0.28.0",
    "qdrant-client>=1.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3.0",
    "pytest-asyncio>=0.25.0",
    "httpx>=0.28.0",
    "ruff>=0.9.0",
    "mypy>=1.14.0",
    "pyyaml>=6.0.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/app"]

[tool.ruff]
line-length = 100
target-version = "py312"
src = ["src", "tests"]
# Autogenerated Alembic migrations are not hand-maintained source.
extend-exclude = ["src/app/db/migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "C4", "SIM", "RUF"]
ignore = ["B008"]  # FastAPI uses function calls (Depends) in argument defaults.

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
asyncio_mode = "auto"
pythonpath = ["src"]

[tool.mypy]
python_version = "3.12"
plugins = ["pydantic.mypy"]
strict = true
namespace_packages = true
mypy_path = "src"
