name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphatrade
          POSTGRES_PASSWORD: alphatrade
          POSTGRES_DB: alphatrade_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alphatrade -d alphatrade_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      AT028_POSTGRES_URL: postgresql+psycopg://alphatrade:alphatrade@localhost:5432/alphatrade_test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: Pytest
        run: uv run pytest

  deployment-safety:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Deployment safety tests
        run: uv run pytest tests/test_deployment_safety.py tests/test_deployment_scripts.py tests/test_config.py -q
      - name: Deployment scripts are executable
        working-directory: .
        run: |
          test -x scripts/check-env.sh
          test -x scripts/verify-safety.sh
          test -x scripts/staging-smoke.sh
          test -x scripts/staging-live-smoke.sh
          test -x scripts/post-deploy-smoke-gate.sh
          test -x scripts/run-migrations.sh
      - name: Post-deploy smoke gate self-check
        working-directory: .
        run: ./scripts/post-deploy-smoke-gate.sh --self-check

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  evaluation:
    runs-on: ubuntu-latest
    needs: [backend]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install backend
        working-directory: backend
        run: uv sync --extra dev
      - name: Evaluate agent
        working-directory: backend
        run: uv run python ../evaluation/evaluate_agent.py
      - name: Evaluate RAG
        working-directory: backend
        run: uv run python ../evaluation/evaluate_rag.py
      - name: Evaluate guardrails
        working-directory: backend
        run: uv run python ../evaluation/evaluate_guardrails.py

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t alphatrade-backend:ci ./backend

  e2e-smoke:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install backend
        working-directory: backend
        run: uv sync --extra dev
      - name: Install frontend
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: E2E smoke (API + public UI)
        env:
          CI: "true"
        run: npm run test:e2e
