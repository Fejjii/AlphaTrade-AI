# Render Blueprint (optional) — AlphaTrade AI staging backend
# Docs: docs/staging_deployment_runbook.md
# Set secret env vars in the Render dashboard; never commit real values.

services:
  - type: web
    name: alphatrade-api-staging
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /health
    preDeployCommand: alembic upgrade head
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: EXECUTION_MODE
        value: paper
      - key: ENABLE_REAL_TRADING
        value: false
      - key: PROVIDER_MODE
        value: fallback
      - key: EXCHANGE_MODE
        value: paper_internal
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: EMBEDDINGS_MODEL
        value: text-embedding-3-small
      - key: BILLING_ENABLED
        value: false
      - key: ALERT_DELIVERY_ENABLED
        value: false
      - key: ALERT_WEBHOOK_ENABLED
        value: false
      - key: TELEGRAM_ALERTS_ENABLED
        value: false
      - key: EMAIL_PROVIDER
        value: mock
      - key: MARKET_WATCHER_ENABLED
        value: false
      - key: MARKET_WATCHER_BRIDGE_ENABLED
        value: false
      - key: MARKET_DATA_ENABLED
        value: true
      - key: DEBUG
        value: false
      - key: LOG_JSON
        value: true
      - key: AUTH_REFRESH_COOKIE_ENABLED
        value: true
      - key: AUTH_OMIT_REFRESH_FROM_BODY
        value: true
      - key: AUTH_COOKIE_SECURE
        value: true
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: ACCESS_TOKEN_DENYLIST_ENABLED
        value: true
      - key: ACCESS_TOKEN_DENYLIST_USE_REDIS
        value: true
      - key: ACCESS_TOKEN_DENYLIST_FAIL_CLOSED
        value: true
      - key: RATE_LIMIT_USE_REDIS
        value: true
      # AT-018: Redis is required outside local; no in-memory fallback.
      - key: RATE_LIMIT_ALLOW_IN_MEMORY_FALLBACK
        value: false
      # AT-018: exactly one trusted reverse proxy (Render) in front of the app.
      - key: TRUSTED_PROXY_HOPS
        value: 1
      - key: REQUIRE_EMAIL_VERIFIED
        value: false
      - key: DEMO_SEED_ENABLED
        value: true
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        value: https://alpha-trade-ai-eight.vercel.app,https://alpha-trade-ai-alphatrade-ai.vercel.app,https://alpha-trade-ai-git-main-alphatrade-ai.vercel.app
      - key: OPENAI_API_KEY
        sync: false

  # Background worker (Slice 59) — separate always-on process; never trades.
  # Disabled by default; flip WORKER_ENABLED to true to activate.
  - type: worker
    name: alphatrade-worker-staging
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    dockerCommand: python -m app.workers.entrypoint
    envVars:
      - key: ENVIRONMENT
        value: staging
      - key: EXECUTION_MODE
        value: paper
      - key: ENABLE_REAL_TRADING
        value: false
      - key: EXCHANGE_MODE
        value: paper_internal
      - key: WORKER_ENABLED
        value: false
      - key: WORKER_MODE
        value: process
      - key: WORKER_SCAN_INTERVAL_SECONDS
        value: 60
      - key: PROVIDER_MODE
        value: fallback
      - key: MARKET_DATA_ENABLED
        value: true
      - key: LOG_JSON
        value: true
      - key: RATE_LIMIT_USE_REDIS
        value: true
      # AT-018: Redis is required outside local; no in-memory fallback.
      - key: RATE_LIMIT_ALLOW_IN_MEMORY_FALLBACK
        value: false
      # AT-018: settings invariant; the worker serves no HTTP but shares Settings.
      - key: TRUSTED_PROXY_HOPS
        value: 1
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
